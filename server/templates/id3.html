<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern ID Variant</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", Arial, sans-serif;
}

@page {
    size: 60mm 92.6mm;
    margin: 0;
}

body {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#ccc;
}

.id-card {
    width:60mm;
    height:92.6mm;
    background:#f5f5f5;
    position:relative;
    overflow:hidden;
    border:0.4mm solid #222;
}

/* ===== TOP DESIGN ===== */
.top-design {
    position:absolute;
    top:-1px;
    left:-1px;
    width:calc(100% + 2px);
    height:42%;
    background:#2d1b4e;
    clip-path: polygon(0 0, 100% 0, 100% 65%, 50% 85%, 0 65%);
}

.top-design::after {
    content:"";
    position:absolute;
    right:-25mm;
    top:-5mm;
    width:60mm;
    height:60mm;
    background:#ff7a18;
    transform:rotate(45deg);
}

/* ===== COMPANY ===== */
.company {
    position:absolute;
    top:6mm;
    left:5mm;
    right:5mm; /* prevent overflow */
    color:#fff;
}

.company-name {
    font-size:3.5mm;
    font-weight:bold;

    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.company-sub {
    font-size:2.2mm;
    opacity:0.7;
}

/* ✅ EMAIL MOVED HERE */
.company-email {
    margin-top:1mm;
    font-size:2mm;
    opacity:0.85;

    overflow-wrap:anywhere;
    word-break:break-word;

    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

/* ===== PHOTO ===== */
.photo {
    position:absolute;
    top:28mm;
    left:50%;
    transform:translateX(-50%);
}

.photo img {
    width:26mm;
    height:26mm;
    border-radius:50%;
    border:1mm solid white;
    object-fit:cover;
}

/* ===== CONTENT ===== */
.content {
    position:absolute;
    top:58mm;
    width:100%;
    text-align:center;
    padding:0 4mm;
}

/* NAME */
.name {
    font-size:4.5mm;
    font-weight:bold;
    color:#222;

    overflow-wrap:anywhere;
}

/* ROLE */
.role {
    font-size:3mm;
    color:#ff7a18;
    margin-top:1mm;
}

/* REMOVE email from here (info now optional) */
.info {
    margin-top:4mm;
    font-size:2.8mm;
    color:#444;
    line-height:1.6;
}

/* ===== BOTTOM ACCENT ===== */
.bottom-accent {
    position:absolute;
    bottom:-1px;
    right:-1px;
    width:35mm;
    height:18mm;
    background:#ff7a18;
    clip-path: polygon(100% 0, 0 100%, 100% 100%);
}
</style>
</head>

<body>

<div class="id-card">

    <div class="top-design"></div>

    <div class="company">
        <div class="company-name">{{institute}}</div>
        <div class="company-sub">{{instituteLabel}} ID</div>

        <!-- ✅ EMAIL NOW SAFE HERE -->
        <div class="company-email">
            {{gmail}}
        </div>
    </div>

    <div class="photo">
        <img src="{{img}}">
    </div>

    <div class="content">

        <div class="name">{{name}}</div>
        <div class="role">{{role}}</div>

    </div>

    <div class="bottom-accent"></div>

</div>

</body>
</html>
